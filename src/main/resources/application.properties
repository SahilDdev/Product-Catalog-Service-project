# Spring Boot Application Configuration
# Day 3: Spring Boot Core - Dependency Injection and Inversion of Control

# Application Name
spring.application.name=product-catalog-service

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Logging Configuration
logging.level.root=INFO
logging.level.com.example.productcatalog=DEBUG

# Console Banner
spring.banner.location=classpath:banner.txt

# Jackson Configuration - Disallow coercion of numbers/booleans into String fields
# spring.jackson.mapper.allow-coercion-of-scalars=false

# ===== H2 DATABASE CONFIGURATION =====
# Database connection URL (in-memory database)
# jdbc:h2:mem:productdb - creates database named "productdb" in memory
spring.datasource.url=jdbc:h2:mem:productdb

# H2 Database driver class
spring.datasource.driverClassName=org.h2.Driver

# H2 Database credentials (default for H2)
spring.datasource.username=sa
spring.datasource.password=

# ===== JPA/HIBERNATE CONFIGURATION =====
# JPA Provider (Hibernate)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate DDL strategy - auto: creates/updates tables automatically
# Options: none, validate, update, create, create-drop
spring.jpa.hibernate.ddl-auto=validate

# ===== FLYWAY CONFIGURATION =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Show SQL statements in console (for debugging)
spring.jpa.show-sql=true

# Format SQL statements in console output
spring.jpa.properties.hibernate.format_sql=true

# Show SQL parameters (bind variables)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===== H2 CONSOLE CONFIGURATION =====
# Enable H2 database console (web UI to view data)
# Access at: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
